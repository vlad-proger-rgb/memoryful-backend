services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: memoryful-app-local
    ports:
      - "8000:8000"
    volumes:
      - ..:/app
    env_file:
      - ../.env.local
    depends_on:
      - db
      - redis
      - rabbitmq
      - celery
      - pubsub-emulator
      - minio
      - ollama

    environment:
      ENVIRONMENT: development
      SEED_DB_ON_EMPTY: ${SEED_DB_ON_EMPTY:-true}
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      GOOGLE_CLOUD_PROJECT: ${GCP_PROJECT_ID}

    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  db:
    image: postgres:16
    container_name: memoryful-db-local
    restart: always
    ports:
      - "5444:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 1s
      retries: 5

  redis:
    image: redis:6.0.7
    container_name: memoryful-redis-local
    restart: always
    volumes:
      - redis_data_local:/data
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 3s
      timeout: 1s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: memoryful-rabbitmq-local
    restart: always
    ports:
      - "5672:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 3s
      timeout: 1s
      retries: 5

  celery:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: memoryful-celery-local
    volumes:
      - ..:/app
    env_file:
      - ../.env.local
    depends_on:
      pubsub-emulator:
        condition: service_started
      redis:
        condition: service_healthy
    restart: always
    environment:
      ENVIRONMENT: development
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
      GOOGLE_CLOUD_PROJECT: ${GCP_PROJECT_ID}
    command: >
      sh -c "
        celery -A app.core.celery_app worker -Q ai_queue --loglevel=debug --hostname=celery@ai_worker &
        celery -A app.core.celery_app worker -Q apps_queue --loglevel=debug --hostname=celery@apps_worker &
        celery -A app.core.celery_app worker -Q email_queue --loglevel=debug --hostname=celery@email_worker &
        celery -A app.core.celery_app worker -Q notifications_queue --loglevel=debug --hostname=celery@notifications_worker &
        celery -A app.core.celery_app worker -Q system_queue --loglevel=debug --hostname=celery@system_worker &
        wait"

  flower:
    image: mher/flower
    container_name: memoryful-flower-local
    restart: on-failure
    command: celery --broker=amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@${RABBITMQ_HOST}:${RABBITMQ_PORT}// flower
    ports:
      - "5555:5555"
    depends_on:
      - celery
      - rabbitmq

  pubsub-emulator:
    image: google/cloud-sdk:latest
    container_name: memoryful-pubsub-local
    ports:
      - "8085:8085"
    command: >
      sh -c "
        gcloud beta emulators pubsub start --host-port=0.0.0.0:8085
      "
    environment:
      - PUBSUB_PROJECT_ID=${GCP_PROJECT_ID}
      - GOOGLE_CLOUD_PROJECT=${GCP_PROJECT_ID}

  minio:
    image: minio/minio:latest
    container_name: memoryful-minio-local
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio_data_local:/data

  ollama:
    image: ollama/ollama:latest
    container_name: memoryful-ollama-local
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data_local:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  redis_data_local:
  postgres_data_local:
  minio_data_local:
  ollama_data_local:

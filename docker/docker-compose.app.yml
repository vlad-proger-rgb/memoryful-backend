# VM-based production deployment for the FastAPI app
# Runs on the same e2-micro VM as the Celery workers
# Pulls pre-built image from Google Artifact Registry (built by CI)
# Requires in .env: GAR_REGION, GCP_PROJECT_ID, GAR_REPOSITORY

version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: memoryful-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  app:
    image: ${GAR_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/memoryful-backend:latest
    container_name: memoryful-app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /home/Vlad/secrets/google/service-account.json:/app/secrets/google/service-account.json:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/Vlad/.docker/config.json:/config.json:ro
    environment:
      WATCHTOWER_POLL_INTERVAL: 30
      WATCHTOWER_CLEANUP: "true"
      DOCKER_CONFIG: /config.json
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

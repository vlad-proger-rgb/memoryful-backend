version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: memoryful-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /mnt/stateful_partition/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app

  app:
    image: ${GAR_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/memoryful-backend:latest
    container_name: memoryful-app
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - /home/Vlad/secrets/google/service-account.json:/app/secrets/google/service-account.json:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.celery
    container_name: celery-worker
    restart: always
    env_file:
      - ../.env
    environment:
      ENVIRONMENT: production
      GCP_CREDENTIALS_PATH: /app/secrets/google/service-account.json
    volumes:
      - /home/Vlad/secrets/google/service-account.json:/app/secrets/google/service-account.json:ro
    depends_on:
      - app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  certbot-renew:
    build:
      context: ..
      dockerfile: docker/Dockerfile.certbot
    container_name: certbot-renew
    restart: unless-stopped
    network_mode: host
    volumes:
      - /mnt/stateful_partition/letsencrypt:/etc/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: >
      sh -c "while true; do
        certbot renew --standalone --pre-hook 'docker stop memoryful-nginx' --post-hook 'docker start memoryful-nginx' --quiet;
        sleep 12h;
      done"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/Vlad/.docker/config.json:/config.json:ro
    environment:
      WATCHTOWER_POLL_INTERVAL: 30
      WATCHTOWER_CLEANUP: "true"
      DOCKER_CONFIG: /config.json
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
